# SCHEMA FOR DEFINING QUESTIONS
# Used for question bank and candidate bank

id: string                        # REQUIRED - Unique identifier
    title: string                 # REQUIRED - Short descriptive title
    storage_type: enum            # REQUIRED - Storage type of the variable.
                                  #            One of: factor, character,
                                  #            integer, numeric, composite,
                                  #            multiple_response, logical,
                                  #            boolean
                                  # NOTE: response_type is accepted as a legacy
                                  #   alias and is mapped to storage_type values
                                  #   (factor→factor, character→character,
                                  #   integer→integer, number→numeric,
                                  #   ranking→integer, select_all→multiple_response)
    question_text: string         # REQUIRED - Full question as asked
    surveys_used: array[chr]      # REQUIRED - Surveys when question is fielded
    restricted_access: enum       # REQUIRED - Exclude from public (default:
                                  # true)
                                  # (Set default options to "true" and "false",
                                  # but allow user to override? see note)

    # Conditionally required
    value_label_id: string        # Required if storage_type == factor
    character_length: int         # Required if storage_type == character
    selection_number: int         # Required if storage_type is multiple_response
                                  # or integer (ranking) - number of
                                  # selections/rankings allowed
    creates_variables:            # Required if storage_type is multiple_response
                                  # or composite (ranking)
      - id: string                # REQUIRED - Unique identifer-name of
                                  #            created variable
        part_label: string        # REQUIRED - Label for this part
        storage_type: enum        # REQUIRED - storage type of created variable
                                  #   (multiple_response parts → boolean;
                                  #    ranking parts → integer)
        value_label_id: string    # Required if storage_type is boolean or factor
        note: string              # Part-specific notes
        other_specify: object     # Included if part should produce text field
            id: string            # REQUIRED - Unique identifer (name of
                                  #            created variable)
            other_label: string   # Label for "specify" part (default:
                                  # "Specify")
            character_length: int # Allowed length of fill
            note: string          # "Specify"-specific notes
    loop_template:                # Required if storage_type = loop (legacy
                                  # response_type = loop)
        variable_template: string # REQUIRED - Variable name with {i} placeholder
                                  #            (e.g., "hhm_age_{i}")
        part_label: string        # REQUIRED - Label including {i} placeholder
        storage_type: enum        # REQUIRED - Storage type of loop variable
                                  #   (one of: factor, character, integer,
                                  #   numeric, multiple_response - NOT loop)
        value_label_id: string    # Required if storage_type = factor
        note: string              # Implementation notes

    # Highly recommended
    universe: string              # Who answers
    vargroup: string              # Topic grouping
    restricted_info: string       # Recommended if restricted_access !=
                                  # "false"; text to explain reason or how to
                                  # gain access
    string_label: string          # Text to display before response for string
                                  #   variables (e.g., Adress ___________)

    # Optional - Legacy aliases (accepted but normalized internally)
    response_type: enum           # Legacy alias for storage_type; accepted for
                                  # backward compatibility and mapped to
                                  # storage_type values (see NOTE above)
    note: string                  # Implementation notes
    instruction: string           # Instructions to respondent
    help_text: string             # Optional help text
    cite: string                  # Question origin/citation
    programmer_note: string       # Note to survey programmer

    # Optional - Inclusion and Survey flow
    if_condition: string          # Display logic
    randomize_responses: bool     # Randomize response option categories?
    required: boolean             # Response required (default: false)
    validation: character         # Type of validation to be performed
    rotation_set: array[string]   # Rotation set membership

    # Optional - Versions (for variables that change across surveys)
    # Newer versions get entered here
    versions: array[object]
      - version_id: string        # REQUIRED - Unique version identifier
        <any field above>         # Any field above (document changes)
        surveys_used: array[chr]  # REQUIRED - Surveys this version was used

    # Optional - Content
    media: file-path              # Any media (e.g., images)

# LEGACY ALIAS MAPPING
# response_type (legacy) → storage_type (canonical):
#   factor      → factor
#   character   → character
#   integer     → integer
#   number      → numeric
#   ranking     → integer (for each created variable)
#   select_all  → multiple_response (for each created variable)
#   loop        → requires explicit storage_type
