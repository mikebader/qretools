YEAR:
  title: Survey year
  storage_type: integer
  description: |
    Year in which the survey was conducted.
  surveys_used:
  - bas-example
  vargroup: svy

JURISDICTION:
  title: Survey jurisdiction
  storage_type: factor
  description: |
    Geographic jurisdiction in which the respondent was sampled.
  value_labels_name: jurisdiction
  surveys_used:
  - bas-example
  vargroup: svy

svy_uid:
  title: Unique identifier
  storage_type: character
  description: |
    Unique respondent identification number.
  surveys_used:
  - bas-example
  vargroup: svy

svy_smonth:
  title: Month survey started
  storage_type: factor
  description: |
    Month that the survey was started.
  value_labels_name: svymonth
  surveys_used:
  - bas-example
  vargroup: svy

svy_sday:
  title: Day survey started
  storage_type: integer
  description: |
    Day of month on which survey was started.
  surveys_used:
  - bas-example
  vargroup: svy

svy_stime:
  title: Time survey started
  storage_type: character
  description: |
    Time at which survey was started.
  note: |
    Time recorded as a string with the format "HH:MM".
  surveys_used:
  - bas-example
  vargroup: svy

svy_cmonth:
  title: Month survey completed
  storage_type: factor
  description: |
    Month that the survey was completed.
  value_labels_name: svymonth
  surveys_used:
  - bas-example
  vargroup: svy

svy_cday:
  title: Day survey completed
  storage_type: integer
  description: |
    Day of month on which survey was completed.
  surveys_used:
  - bas-example
  vargroup: svy

svy_ctime:
  title: Time survey completed
  storage_type: character
  description: |
    Time at which survey was completed.
  note: |
    Time recorded as a string with the format "HH:MM".
  surveys_used:
  - bas-example
  vargroup: svy

svy_rpord:
  title: Rich/Poor amount question order
  storage_type: factor
  description: |
    Condition that respondent was assigned for the order of questions about the
    amount rich and poor families make. Variable indicates which question was
    asked first.
  value_labels_name: rpord
  surveys_used:
  - bas-example
  vargroup: svy
