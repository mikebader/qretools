hlt_phq21:
  title: Feeling down/depressed within last two weeks
  response_type: factor
  question_text: Over the last two weeks, how often have you been bothered by feeling
    down, depressed, or hopeless?
  surveys_used:
  - bas-2023
  - bas-2024
  vargroup: hlt
  source: PHQ-2 Q1
  value_labels_name: days
  note: "\nIf the respondent answered 'more than half the days' or 'nearly every day',\
    \ the \nfollowing message was displayed on their screen: \n\n> If you are experiencing\
    \ emotional distress and wish to talk to a trained \nprofessional, you may call\
    \ 988. You can call 24 hours a day, 7 days a week. \n\n"
  versions:
  - version_id: '2024'
    surveys_used:
    - bas-2024
    question_text: Over the last two weeks, how often have you been bothered by feeling
      down,  depressed or hopeless?
    title: Feeling down
    value_labels_name: phq4
hlt_phq22:
