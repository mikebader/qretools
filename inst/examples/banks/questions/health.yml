hlt_pamodd:
  title: Moderate-intensity physical activity
  response_type: factor
  question_text: "The next two questions are about physical activities such as  exercise,\
    \ sports, or physically active hobbies that you may do in your  leisure time.\n\
    \nModerate-intensity activities cause moderate increases in breathing or heart\
    \  rate; whereas vigorous-intensity activities cause large increases in  breathing\
    \ or heart rate. \n\nOver the __past two weeks__, how many days did you do __moderate-intensity__\
    \  leisure-time physical activities?"
  surveys_used:
  - bas-2024
  vargroup: hlt
  value_labels_name: hltfrequency5
hlt_pamodh:
  title: Moderate-intensity minutes of exercise
  response_type: integer
  question_text: On average, how many minutes did you exercise on each day that you
