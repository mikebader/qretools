hlt_khom:
  title: Know victims of homicide
  response_type: integer
  question_text: Over your lifetime, how many people have you known personally who
    were victims  of homicide? Please tell us the total number of people that died  by
    homicide.
  surveys_used:
  - bas-2024
  vargroup: hlt
  source: Adapted from GSS cideknew
hlt_khomgun:
  title: Homicide caused by gun or firearm
  response_type: factor
  question_text: Thinking of the homicide victims that you  knew personally, were
    any of the victims killed with a gun or firearm?
  surveys_used:
  - bas-2024
  vargroup: hlt
  value_labels_name: yesno2
hlt_ksui:
  title: Know people that died by suicide
  response_type: integer
  question_text: 'The next questions deal with a difficult topic that may be  sensitive
    for you. It is not clearly understood how a relative or friend''s death by suicide
    may affect one''s life afterwards. Please answer these  questions as best as you
    can, and you can decline to answer any question  if you are uncomfortable.


    Over your lifetime, how many people have you known personally that died by  suicide?
    Please tell us the total number of people that died by suicide.'
  surveys_used:
  - bas-2024
  vargroup: hlt
  source: GSS suinum
hlt_ksuigun:
  title: Suicide using gun or firearm
  response_type: factor
  question_text: Thinking of the people you have known personally who died by suicide,
    did any  use a gun or firearm to end their life?
  surveys_used:
  - bas-2024
  vargroup: hlt
  value_labels_name: yesno2
hlt_kinjgun:
  title: Know people injured by gun or firearm
  response_type: integer
  question_text: Over your lifetime, how many people have you personally known who  were
    injured, but not killed, by a gun or firearm? Please include people who  injured
    themselves but do not include people who were injured while serving in  the military.
  surveys_used:
  - bas-2024
  vargroup: hlt
  note: "\nIf the respondent reported knowing at least one person who died of homicide,\
    \ \ndied of suicide, or that was injured by a gun, the following was displayed\
    \ on\ntheir screen:\n\n> If you are experiencing emotional distress and wish to\
    \ talk to a trained \n> professional, you may call 988. You can call 24 hours\
    \ a day, 7 days a week.\n"
