dem_nchild:
  title: Total number of children in household
  storage_type: integer
  question_text: ''
  surveys_used:
  - bas-2023
  vargroup: dem
  note: "\nNote that 9 respondents reported having children in the household \n(i.e.,\
    \ `dem_child==1`), but reported having zero children in each of the \n`dem_childyng`,\
    \ `dem_childmid`, and `dem_childold` variables. Since respondents \nreported zero\
    \ children and the values were not missing, these repondents were \ncoded as having\
    \ zero children in the household.\n"
  description: "\nTotal number of children in household constructed as the sum of\n\
    `bas23_dem_childyng`, `bas23_dem_childmid`, and `bas23_dem_childold`. \n\nConstructed\
    \ using the following logic:\n\n* `-9`: the respondent broke off the interview\
    \ at or before `dem_child` or if \n  the respondent broke off the interview during\
    \ one of the questions \n  `dem_childyng`, `dem_childmid`, or `dem_childold`,\
    \ then we code the count \n  variable as an interview break-off\n* `-8`: respondent\
    \ reported that they had children in the household (i.e., \n  `dem_child==1`),\
    \ but did not answer all of `dem_childyng`, `dem_childmid`, or \n  `dem_childold`\n\
    * `0`: if respondent reported that they did not have any children in the \n  \
    \ household (i.e., `dem_child==2`)\n* Otherwise, the sum of non-missing values\
    \ in `dem_childyng`, `dem_childmid`, \n  `dem_childold`\n\n"
dem_age:
