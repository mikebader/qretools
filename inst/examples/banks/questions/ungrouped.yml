  vargroup: dem
  description: "\nRespondent's age at the time of survey constructed as the difference\
    \ between the\nsurvey year (2023) and the respondent's birth year.\n\nThe age\
    \ variable equals the difference between the respondent's\nbirth year and the\
    \ year of the survey (2023). Thus, the age variable records \na respondent's age\
    \ on December 31, 2023. \n\n* One respondent reported a birth year of 2094 and\
    \ was re-coded to 1994\n* One respondent reported a birth year of 1900 and was\
    \ re-coded to be \nitem-missing (`-8`)\n\n"
