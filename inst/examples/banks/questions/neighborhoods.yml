# Neighborhood Questions - Example for testing
# Dictionary format: varname is the key

nhd_nyrs:
  title: "Years in Neighborhood"
  storage_type: integer
  vargroup: nhd
  question_text: "How many years have you lived in your current neighborhood? Enter 0 if you have lived in your current neighborhood less than 1 year."
  surveys_used: ["bas-2023", "bas-2024", "bas-2025"]
  source: "DCAS 2018 Q4"
  validation:
    min: 0
    max: 120

nhd_blks:
  title: "Neighborhood Size in Blocks"
  storage_type: factor
  vargroup: nhd
  question_text: "How many blocks are in the area that you think of as your neighborhood?"
  surveys_used: ["bas-2024", "bas-2025"]
  source: "DCAS 2018 Q6"
  value_labels_name: blocks

nhd_sat:
  title: "Neighborhood Satisfaction"
  storage_type: factor
  vargroup: nhd
  question_text: "How satisfied are you with your neighborhood as a place to live?"
  surveys_used: ["bas-2023", "bas-2024", "bas-2025"]
  source: "DCAS 2018 Q6"
  value_labels_name: satisfied5
