nhd_schre:
  title: Public school rating reason
  response_type: factor
  question_text: Some people think about different things when rating the quality
    of schools.  Which of the following is the most important reason that you answered
    that the  quality of public schools in your neighborhood was "{{SCHQUAL}}"?
  surveys_used:
  - bas-2024
  vargroup: nhd
  value_label_id: schre
  note: "\n{{SCHQUAL}} was filled with response the respondent provided in `nhd_schqual`.\n\
    \nIf the respondent did not answer `nhd_schqual`, the respondent was asked: \n\
    \"Some people think about different things when rating the quality of schools.\
    \ \nWhich of the following is the most important reason to you when thinking about\
    \ \nthe quality of public schools in your neighborhood?\"\n"
nhd_schre_os:
  title: Public school rating reason--other
  response_type: character
  question_text: ''
  surveys_used:
  - bas-2024
  vargroup: nhd
  note: "\nRespondents were prompted to specify this reason if they indicated \"Other\"\
    \ as\ntheir response to `nhd_schre`. The survey interface, however, allowed \n\
    respondents to enter a value even if they had entered a response to one of the\n\
    items in `nhd_schre`. Therefore, there are six responses in this variable even\n\
    though respondents also answered one of the five options in `nhd_schre`. \n"
  description: '

    Respondent-filled reason for rating the quality of public schools in their

    neighborhood.'
