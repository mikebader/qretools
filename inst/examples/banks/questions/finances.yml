    you didn’t  have money to get more. Was this…
  surveys_used:
  - bas-2023
  vargroup: fin
  value_labels_name: true3
fsi_nobal:
  title: 'Food insecurity: can''t afford balanced meals'
  storage_type: factor
  question_text: Within the past 12 months, you could not afford to eat balanced meals
  surveys_used:
  - bas-2023
  vargroup: fin
