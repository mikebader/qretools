fin_jobempl:
  title: Employment status
  storage_type: factor
  question_text: Now we want you to think about your current job. If you have more
    than one,  please think about the job that you rely on the most for your income.
    Last week what was your employment status?
  surveys_used:
  - bas-2023
  vargroup: fin
  value_labels_name: employment
  note: "\nRespondents who reported \"Other\" were presented with opportunity to specify\n\
    employment status (responses are reported in variable \n`bas23_fin_jobemployed_os`).\
    \ \n\nA number of respondents reported being on disability; a category for disability\n\
    was added, but only included for those respondents that volunteered that \ninformation.\n\
    \nResponses that indicated caregiving was included in the \"keeping house\" \n\
    category. \n\n"
fin_jobsect:
  title: Employment sector
  storage_type: factor
  question_text: Which of the following best describes your current employer?
  surveys_used:
  - bas-2023
  vargroup: fin
  value_labels_name: sector
  note: "\nThis question was presented to respondent if theier answer to the employment\
    \ \nstatus question (before recoding) was one of: \"Working full-time\", \"Working\
    \ \npart-time\", or \"With a job but not at work because of temporary illness,\
    \ \nvacation or strike.\"\n\n"
fin_jobeasy:
  title: Job search confidence
  storage_type: factor
  question_text: How difficult or easy do you think it would be for you to find another
    job at  least as good as your current one?
  surveys_used:
  - bas-2023
  vargroup: fin
  source: ISSP 2015 Q12 and GSS jobeasy
  value_labels_name: easy5
  note: "\nThis question was presented to respondent if theier answer to the employment\
    \ \nstatus question (before recoding) was one of: \"Working full-time\", \"Working\
    \ \npart-time\", or \"With a job but not at work because of temporary illness,\
    \ \nvacation or strike.\"\n\n"
fin_jobworry:
  title: Possibility of losing job
  storage_type: factor
  question_text: To what extent, if at all, do you worry about the possibility of
    losing your  job?
  surveys_used:
  - bas-2023
  vargroup: fin
  source: ISSP 2015 Q28 and GSS worryjob
  value_labels_name: worry
  note: "\nThis question was presented to respondent if theier answer to the employment\
    \ \nstatus question (before recoding) was one of: \"Working full-time\", \"Working\
    \ \npart-time\", or \"With a job but not at work because of temporary illness,\
    \ \nvacation or strike.\"\n\n"
fin_amtrich:
  title: Rich Household Threshold
  storage_type: character
  question_text: At what level of income would you say that a household becomes rich?      In
    other words, how much money does a family need to make per year for you      to
    consider them rich?
  surveys_used:
  - bas-2025
  vargroup: fin
  note: "\n    Respondents were randomized into two categories based on the value\
    \ of \n    RICHPOORORD assigned to them. If RICHPOORORD=1, the respondent was\
    \ asked \n    this question first, then a question about what level of income\
    \ they would \n    consider a household poor (fin_amtpoor). If RICHPOORORD=2,\
    \ the respondent \n    was asked the question about what level of income they\
    \ would consider a \n    household poor and were then asked this question after.\n\
    \    "
fin_amtpoor:
  title: Poor Household Threshold
  storage_type: character
  question_text: At what level of income would you say that a household becomes poor?      In
    other words, how little money does a family need to make per year for you     to
    consider them poor?
  surveys_used:
  - bas-2025
  vargroup: fin
  note: "\n    Respondents were randomized into two categories based on the value\
    \ of \n    RICHPOORORD assigned to them. If RICHPOORORD=1, the respondent was\
    \ asked a \n    question about what level of income they would consider a household\
    \ rich \n    (fin_amtrich), and then were asked this question. If RICHPOORORD=2,\
    \ the \n    respondent was asked this question first, and then were asked what\
    \ level of \n    income they would consider a household rich.\n    "
fin_econba:
  title: Baltimore Current Economic Conditions
  storage_type: factor
  question_text: How would you rate economic conditions in __the Baltimore area__
    today?
  surveys_used:
  - bas-2025
  vargroup: fin
  source: "\n    Adapted from Gallup. 2025. Gallup Poll. Question 9: 31122385.00008.\
    \ \n    Cornell University, Ithaca, NY: Roper Center for Public Opinion Research.\
    \ \n    (https://doi.org/10.25940/ROPER-31122385).\n    "
  value_labels_name: econ4
  note: "\n    Respondents were randomized into two categories based on the value\
    \ of \n    BALTUSORD. If BALTUSORD=1, questions were asked in the order: fin_econba,\
    \ \n    fin_efutba, fin_econus, fin_efutus. If BALTUSORD=2, questions were asked\
    \ in \n    the order: fin_econus, fin_efutus, fin_econba, fin_efutba.\n    "
fin_efutba:
  title: Baltimore Economic Trajectory
  storage_type: factor
  question_text: Right now, do you think that economic conditions in __the Baltimore
    area__      are getting a lot better, getting a little better, staying about the
    same,      getting a little worse, or getting a lot worse?
  surveys_used:
  - bas-2025
  vargroup: fin
  source: "\n    Adapted from: USA Today. 2010. USA Today/Gallup Poll: August Wave\
    \ 1. \n    Question 44: USGALLUP.10AGT027.R18. Cornell University, Ithaca, NY:\
    \ Roper \n    Center for Public Opinion Research. (DOI:10.25940/ROPER-31089759)\
    \ and \n    Gallup. 2025. Gallup Poll. Question 10: 31122385.00009. Cornell University,\
    \ \n    Ithaca, NY: Roper Center for Public Opinion Research. \n    (DOI:10.25940/ROPER-31122385).\n\
    \    "
  value_labels_name: efut5
  note: "\n    Respondents were randomized into two categories based on the value\
    \ of \n    BALTUSORD. If BALTUSORD=1, questions were asked in the order: fin_econba,\
    \ \n    fin_efutba, fin_econus, fin_efutus. If BALTUSORD=2, questions were asked\
    \ in \n    the order: fin_econus, fin_efutus, fin_econba, fin_efutba.\n    "
