fin_housworr:
  title: 'Housing Insecurity: Affordability Concern'
  storage_type: factor
  question_text: In the __past 12 months__, that is since {{CMONTHNM}} 2024, how often
    would      you say you  were worried or stressed about having enough money to
    pay your      {{TENURENM}}?
  surveys_used:
  - bas-2025
  vargroup: fin
  source: "\n    Murdoch, James, Meghna Brahmachari, Dennis Okyere, Foaud Moumen,\
    \ and Sean \n    Streiff. 2022. Measuring Housing Insecurity: Index Development\
    \ Using \n    American Housing Survey Data. Washington, D.C.: United States Department\
    \ of \n    Housing and Urban Development Office of Policy Development and Research.\n\
    \    "
  value_labels_name: housworr5
  note: "\n    This question referred to rent, mortgage, or housing payments based\
    \ on the \n    respondent's answer when they were asked if they rented their home,\
    \ owned \n    it, or had some other kind of payment arrangement (dem_own).\n \
    \   \n    {{CMONTHNM}} was filled in with the month in which the respondent asnwered\
    \ \n    the survey in.\n    "
