    Form HH4'
  value_labels_name: true3
fsi_cutsize:
  title: 'Food insecurity: skipped meals'
  storage_type: factor
  question_text: Within the past 12 months, did you or other adults in your household
    ever cut  the size of your meals or skip meals because there wasn't enough money
    for food?
  surveys_used:
  - bas-2023
  vargroup: fin
  source: 'U.S. Household Food Security Survey Module: Six-Item Short Form AD1'
  value_labels_name: 'yes'
  note: "\nIf the respondent answered 'yes' to this question, they were directed to\
    \ a \nquestion asking how often they would cut meal sizes due to insecurity. If\
    \ they \nanswered 'no' to this question, they were not asked the next question\
    \ about \ncutting meal sizes.\n"
fsi_eatless:
  title: 'Food insecurity: eat less'
  storage_type: factor
  question_text: Within the past 12 months, did you ever eat less than you felt you
    should  because there wasn't enough money for food?
  surveys_used:
  - bas-2023
  vargroup: fin
  source: 'U.S. Household Food Security Survey Module: Six-Item Short Form AD2'
  value_labels_name: 'yes'
fsi_hungry:
  title: 'Food insecurity: ever hungry'
