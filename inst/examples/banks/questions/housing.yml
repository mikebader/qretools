hsg_tenure:
  title: Housing tenure
  response_type: factor
  question_text: Do you rent your home, own it, or do you have some other arrangement?
  surveys_used:
  - bas-example
  vargroup: hsg
  value_label_id: own
hsg_own_years:
  title: Years owned home
  response_type: integer
  question_text: For approximately how many years have you owned your current home?
  surveys_used:
  - bas-example
  vargroup: hsg
hsg_own_value:
  title: Estimated home value
  response_type: integer
  question_text: What is your best estimate of what your home would sell for today,
    in dollars?
  surveys_used:
  - bas-example
  vargroup: hsg
hsg_rent_monthly:
  title: Monthly rent
  response_type: integer
  question_text: How much do you pay per month in rent, not including any utilities?
  surveys_used:
  - bas-example
  vargroup: hsg
