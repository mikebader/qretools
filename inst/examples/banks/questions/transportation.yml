tsp_ssfapref:
  title: Support for active transportation policy
  storage_type: factor
  question_text: Thinking about all the things that the {{JURISDICTION}}  government
    does, how much do you support {{JURISDICTION}} making it  easier for people to
    walk, bike, and take public transportation in  {{JURISDICTION}}?
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: tspjurisdiction4
tsp_ssfades:
  title: Support street redesign for active transport
  storage_type: factor
  question_text: How much do you support {{JURISDICTION}} changing the way  that streets
    are designed to make it easier for people to bike, walk,  and take public transportation
    in {{JURISDICTION}}?
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: tspjurisdiction4
tsp_ssfatopk:
  title: Support parking removal for active transport
  storage_type: factor
  question_text: '{{JURISDICTION}} may need to remove parking spaces in  front of
    homes and businesses. How much do you support {{JURISDICTION}}  making it easier
    for people to walk, bike, and take public  transportation even if it means removing
    parking spaces?'
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: tspjurisdiction4
tsp_ssfatotl:
  title: Support travel lane removal for active transport
  storage_type: factor
  question_text: '{{JURISDICTION}} may need to remove travel lanes  used by cars.
    How much do you support {{JURISDICTION}} making  it easier for people to walk,
    bike, and take public transportation  even if it means removing travel lanes for
    cars?'
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: tspjurisdiction4
tsp_ssfatosl:
  title: Support slower cars for active transport
  storage_type: factor
  question_text: '{{JURISDICTION}} may need to make people in cars drive  slower.
    How much do you support {{JURISDICTION}} making it easier  for people to walk,
    bike, and take public transportation even if  it means making people in cars drive
    slower?'
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: tspjurisdiction4
tsp_cstknow:
  title: Jurisdiction has complete street policy
  storage_type: factor
  question_text: __[See note for preface to question]__ To the best of your  knowledge,
    does {{JURISDICTION}} have a {{COMPSTRTXT}}?
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: cstknow
  note: "\nThis question was prefaced with one of the two statements (prefaces were\
    \ randomly\nassigned). \n\nPreface 1 (asked if `svy_cstsplt` = 1):\n\n> This question\
    \ asks about a policy called “Complete Streets.” Complete Streets \n> requires\
    \ that a local government make roads safer for pedestrians, bicyclists, \n> public\
    \ transit riders and other people who are not driving, even if it \n> sometimes\
    \ means slowing down cars, removing lanes, or reducing parking.\n\nPreface 2 (asked\
    \ if `svy_cstsplt` = 2)\n\n> This question asks about a policy that {{JURISDICTION}}\
    \ may pass to make roads \n> safer for pedestrians, bicyclists, public transit\
    \ riders and other people who \n> are not driving, even if it sometimes means\
    \ slowing down cars, removing lanes, \n> or reducing parking. \n\nThe value {{COMPSTRTXT}}\
    \ was randomly assigned to be filled with the text \ncontained in variable `str_csttxt`.\n"
tsp_cstfo:
  title: Favor complete street policy
  storage_type: factor
  question_text: "__[See note for preface to question]__ \n\nSome people favor {{COMPSTRTXT}}\
    \ because it helps  make streets safer to walk and to bike. Others think that\
    \ the policy  removes places to park and makes it slower for cars to get around.\
    \  What about you, do you favor or oppose {{JURISDICTION}} having a  {{COMPSTRTXT}}?"
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: cstfo
  note: "\nThis question was prefaced with one of the two statements (prefaces were\
    \ randomly\nassigned). \n\nPreface 1 (asked if `svy_cstsplt` = 1):\n\n> This question\
    \ asks about a policy called “Complete Streets.” Complete Streets \n> requires\
    \ that a local government make roads safer for pedestrians, bicyclists, \n> public\
    \ transit riders and other people who are not driving, even if it \n> sometimes\
    \ means slowing down cars, removing lanes, or reducing parking.\n\nPreface 2 (asked\
    \ if `svy_cstsplt` = 2)\n\n> This question asks about a policy that {{JURISDICTION}}\
    \ may pass to make roads \n> safer for pedestrians, bicyclists, public transit\
    \ riders and other people who \n> are not driving, even if it sometimes means\
    \ slowing down cars, removing lanes, \n> or reducing parking. \n\nThe value {{COMPSTRTXT}}\
    \ was randomly assigned to be filled with the text \ncontained in variable `str_csttxt`.\n"
tsp_cstfoa:
  title: Strength of opinion for complete street policy
  storage_type: factor
  question_text: '[IF tsp_cstfo = 1 or 2]: How much do you {{favor/oppose}}  {{JURISDICTION}}
    having a {{COMPSTRTXT}}?'
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: cstfoa
tsp_cstop:
  title: Opinion of Complete Street policy
  storage_type: factor
  question_text: ''
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: cstop
  note: "\nQuestions used to construct this variable were prefaced with one of the\
    \ two \nstatements (prefaces were randomly assigned). \n\nPreface 1 (asked if\
    \ `svy_cstsplt` = 1):\n\n> This question asks about a policy called “Complete\
    \ Streets.” Complete Streets \n> requires that a local government make roads safer\
    \ for pedestrians, bicyclists, \n> public transit riders and other people who\
    \ are not driving, even if it \n> sometimes means slowing down cars, removing\
    \ lanes, or reducing parking.\n\nPreface 2 (asked if `svy_cstsplt` = 2)\n\n> This\
    \ question asks about a policy that {{JURISDICTION}} may pass to make roads \n\
    > safer for pedestrians, bicyclists, public transit riders and other people who\
    \ \n> are not driving, even if it sometimes means slowing down cars, removing\
    \ lanes, \n> or reducing parking. \n\nThe value {{COMPSTRTXT}} was randomly assigned\
    \ to be filled with the text \ncontained in variable `str_csttxt`.\n"
  description: "\nOpinion direction and strength for Complete Street policy based\
    \ on combining\nopinion of `tsp_cstfo` (favor/oppose/neither) with strength of\
    \ favoring or \nopposing. Respondents were randomized into condition that either\
    \ named \nComplete Streets or described the policy without naming it (see note).\n"
tsp_vehcat:
  title: Number of vehicles (categorical)
  storage_type: factor
  question_text: ''
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: tspvehcat
  description: '

    Number of vehicles owned, leased, or available for regular use by the people

    who currently live in your household. Constructed as a categorical value from

    `tsp_vehcnt`.

    '
tsp_vehrelus:
  title: Reliable vehicle
  storage_type: factor
  question_text: Thinking about the vehicle you use most of the time, can you rely
    on this  vehicle to get you to school, work, or other places? Asked only of respondents  who
    had one or more vehicles, i.e., `tsp_vehcnt` > 0.
  surveys_used:
  - bas-2024
  vargroup: tsp
  source: DMACS Wave 18 vehicle_usual_rely_d18
  value_labels_name: yesno2
tsp_bikeown:
  title: Bike owned
  storage_type: factor
  question_text: Do you own a bike that you, personally, can use?
  surveys_used:
  - bas-2024
  vargroup: tsp
  value_labels_name: yesno2
